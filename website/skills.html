<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skill Synergies — Aither UO</title>
<style>
  :root {
    --bg: #0e0e10;
    --bg2: #16161a;
    --bg3: #1e1e24;
    --border: #2a2a32;
    --text: #e8e8ec;
    --muted: #8888a0;
    --accent: #7c6af7;
    --accent2: #a898ff;
    --phys: #4a8cc7; --phys-bg: #1a2a3a;
    --fire: #c47a2a; --fire-bg: #2a1e10;
    --cold: #3a9e7a; --cold-bg: #102a22;
    --pois: #6a9e3a; --pois-bg: #182210;
    --nrg:  #8a6adf; --nrg-bg:  #1e1830;
    --off:  #c04a4a; --off-bg:  #2a1212;
    --summ: #b05aaa; --summ-bg: #2a1228;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.6; min-height: 100vh; }

  header { border-bottom: 1px solid var(--border); padding: 1.25rem 2rem; display: flex; align-items: baseline; gap: 1rem; }
  .site-name { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent2); text-decoration: none; }
  .site-name:hover { color: var(--text); }
  header h1 { font-size: 18px; font-weight: 500; color: var(--text); }
  header p { font-size: 13px; color: var(--muted); margin-left: auto; }
  .header-back { font-size: 12px; color: var(--muted); text-decoration: none; margin-left: auto; transition: color 0.15s; }
  .header-back:hover { color: var(--text); }

  .layout { display: grid; grid-template-columns: 190px 1fr; min-height: calc(100vh - 57px); }

  .sidebar { border-right: 1px solid var(--border); padding: 1rem 0; background: var(--bg2); position: sticky; top: 0; height: calc(100vh - 57px); overflow-y: auto; }
  .sidebar-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); padding: 0 1rem 0.5rem; }
  .skill-btn { display: block; width: 100%; text-align: left; padding: 7px 1rem; font-size: 13px; border: none; background: transparent; cursor: pointer; color: var(--muted); font-family: inherit; transition: background 0.1s, color 0.1s; }
  .skill-btn:hover { background: var(--bg3); color: var(--text); }
  .skill-btn.active { background: var(--bg3); color: var(--text); font-weight: 500; border-left: 2px solid var(--accent); padding-left: calc(1rem - 2px); }

  .content { padding: 2rem; max-width: 720px; }
  .skill-title { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .skill-desc { font-size: 13px; color: var(--muted); margin-bottom: 1.75rem; }

  .bonus-group { margin-bottom: 1.5rem; }
  .group-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .group-note { font-size: 12px; color: var(--muted); margin-bottom: 8px; font-style: italic; }
  .bonus-table { width: 100%; border-collapse: collapse; background: var(--bg2); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .bonus-table td { padding: 9px 14px; border-bottom: 1px solid var(--border); font-size: 13px; }
  .bonus-table tr:last-child td { border-bottom: none; }
  .bonus-table td:first-child { color: var(--muted); }
  .bonus-table td:last-child { text-align: right; }

  .pill { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 12px; font-weight: 500; }
  .pill-phys { background: var(--phys-bg); color: var(--phys); }
  .pill-fire { background: var(--fire-bg); color: var(--fire); }
  .pill-cold { background: var(--cold-bg); color: var(--cold); }
  .pill-pois { background: var(--pois-bg); color: var(--pois); }
  .pill-nrg  { background: var(--nrg-bg);  color: var(--nrg);  }
  .pill-off  { background: var(--off-bg);  color: var(--off);  }
  .pill-summ { background: var(--summ-bg); color: var(--summ); }

  .welcome { color: var(--muted); padding-top: 3rem; font-size: 14px; }
  .welcome strong { color: var(--text); }

  @media (max-width: 640px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 4px; padding: 0.75rem; }
    .sidebar-label { display: none; }
    .skill-btn { width: auto; padding: 4px 10px; border-radius: 20px; border-left: none !important; padding-left: 10px !important; font-size: 12px; }
    .skill-btn.active { background: var(--accent); color: #fff; }
    .content { padding: 1.25rem; }
  }
</style>
</head>
<body>

<header>
  <a href="/" class="site-name">Aither</a>
  <h1>Skill Synergies</h1>
  <a href="/systems.html" class="header-back">← Back to Systems</a>
</header>

<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-label">Skills</div>
    <button class="skill-btn" onclick="show('alchemy',this)">Alchemy</button>
    <button class="skill-btn" onclick="show('anatomy',this)">Anatomy</button>
    <button class="skill-btn" onclick="show('taming',this)">Animal Taming</button>
    <button class="skill-btn" onclick="show('blacksmith',this)">Blacksmithy</button>
    <button class="skill-btn" onclick="show('camping',this)">Camping</button>
    <button class="skill-btn" onclick="show('carpentry',this)">Carpentry</button>
    <button class="skill-btn" onclick="show('detect',this)">Detect Hidden</button>
    <button class="skill-btn" onclick="show('fishing',this)">Fishing</button>
    <button class="skill-btn" onclick="show('forensics',this)">Forensics</button>
    <button class="skill-btn" onclick="show('healing',this)">Healing</button>
    <button class="skill-btn" onclick="show('herding',this)">Herding</button>
    <button class="skill-btn" onclick="show('hiding',this)">Hiding</button>
    <button class="skill-btn" onclick="show('inscribe',this)">Inscribe</button>
    <button class="skill-btn" onclick="show('lumber',this)">Lumberjacking</button>
    <button class="skill-btn" onclick="show('mining',this)">Mining</button>
    <button class="skill-btn" onclick="show('spiritspeak',this)">Spirit Speak</button>
    <button class="skill-btn" onclick="show('stealth',this)">Stealth</button>
    <button class="skill-btn" onclick="show('tasteid',this)">Taste ID</button>
    <button class="skill-btn" onclick="show('tracking',this)">Tracking</button>
    <button class="skill-btn" onclick="show('veterinary',this)">Veterinary</button>
    <button class="skill-btn" onclick="show('wrestling',this)">Wrestling</button>
  </nav>

  <main class="content" id="content">
    <div class="welcome">
      <strong>Select a skill</strong> from the list to see all custom bonuses it provides on Aither.
    </div>
  </main>
</div>

]},

  ]},

function show(id, btn) {
  document.querySelectorAll('.skill-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const s = skills[id];
  if (!s) return;
  let html = `<div class="skill-title">${s.name}</div><div class="skill-desc">${s.desc}</div>`;
  for (const g of s.bonuses) {
    html += `<div class="bonus-group"><div class="group-label">${g.group}</div>`;
    if (g.note) html += `<div class="group-note">${g.note}</div>`;
    html += `<table class="bonus-table">`;
    for (const r of g.rows) {
      html += `<tr><td>${r[0]}</td><td><span class="pill ${r[2]}">${r[1]}</span></td></tr>`;
    }
    html += `</table></div>`;
  }
  document.getElementById('content').innerHTML = html;
}
</script>
</body>
</html>
